<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="chat.pageTitle">Grok2API - Chat 聊天</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/function/css/chat.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-7xl px-6 py-8 fade-in chat-main">
    <div class="chat-layout">
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" data-i18n="chat.sessions">会话</span>
          <div class="sidebar-actions">
            <button id="newChatBtn" class="sidebar-action-btn icon-btn" type="button" title="新增" data-i18n-title="chat.newChat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
            <button id="collapseSidebarBtn" class="sidebar-action-btn icon-btn" type="button" title="折叠" data-i18n-title="chat.collapseSidebar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 6 9 12 15 18"></polyline>
              </svg>
            </button>
          </div>
        </div>
        <div class="sidebar-list" id="sessionList"></div>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <button id="sidebarExpandBtn" class="sidebar-expand-btn icon-btn" type="button" title="展开" data-i18n-title="chat.expandSidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 6 15 12 9 18"></polyline>
        </svg>
      </button>
      <div class="chat-shell">
        <div class="chat-title">
          <div style="display:flex;align-items:center;gap:10px;">
            <button id="sidebarToggle" class="sidebar-toggle" type="button" title="会话列表" data-i18n-title="chat.sessionList">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
            <div>
              <h2 class="chat-title-text" data-i18n="chat.title">Chat 聊天</h2>
              <p class="chat-subtitle" data-i18n="chat.subtitle">通过 chat 接口与 Grok 进行会话聊天</p>
            </div>
          </div>
          <span id="statusText" class="status-text" data-i18n="chat.ready">就绪</span>
        </div>

      <div id="chatLog" class="chat-thread">
        <div id="emptyState" class="chat-empty" data-i18n="chat.emptyState">输入一条消息开始对话。</div>
      </div>

      <div class="composer-shell">
        <div class="composer-input">
          <div class="composer-preview-area">
            <div id="fileBadge" class="file-badge hidden">
              <img id="fileThumb" class="file-thumb hidden" alt="preview" />
              <span id="fileName" class="file-name"></span>
              <button id="fileRemoveBtn" class="file-remove" type="button">×</button>
            </div>
          </div>

          <div class="composer-top">
            <textarea id="promptInput" class="composer-textarea" placeholder="询问任何内容" data-i18n-placeholder="chat.placeholder"></textarea>
          </div>
          <div class="composer-hint" id="composerHint">Enter 发送 · Shift+Enter 换行</div>

          <div class="composer-bottom">
            <div class="composer-actions composer-tools-left">
              <button id="attachBtn" class="icon-btn" type="button" title="上传文件" data-i18n-title="chat.uploadFile">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.9-9.9a3.5 3.5 0 0 1 4.95 4.95l-9.9 9.9a2 2 0 0 1-2.83-2.83l8.49-8.49"></path>
                </svg>
              </button>
              <input id="fileInput" class="file-input" type="file" />
              <div class="model-chip" id="modelChip">
                <span class="model-label" id="modelLabel">grok-4.20-beta</span>
                <svg class="model-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                <div class="model-dropdown hidden" id="modelDropdown"></div>
              </div>
              <button id="refreshModelsBtn" class="icon-btn" type="button" title="刷新模型" aria-label="刷新模型">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"></polyline>
                  <polyline points="1 20 1 14 7 14"></polyline>
                  <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
              </button>
            </div>
            <div class="composer-send-right">
              <button id="sendBtn" class="send-btn send-up-btn" type="button" aria-label="Send" title="发送" data-i18n-title="chat.send" data-i18n-aria-label="chat.send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="18" x2="12" y2="6"></line>
                  <polyline points="7 11 12 6 17 11"></polyline>
                </svg>
              </button>
            </div>
          </div>
      </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/function-header.js?v=1.6.2"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/function/js/chat.js?v=1.6.2"></script>
</body>

</html>
